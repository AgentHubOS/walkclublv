<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Oswald:wght@400;500;600;700&family=Permanent+Marker&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; font-family: 'DM Sans', system-ui, sans-serif; color: #000; overflow-x: hidden; }
  a { color: #00BF63; text-decoration: none; }
  a:hover { color: #FF914D; }
  @keyframes walkbob { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-9px) rotate(2deg); } }
  @keyframes wc-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
</style>
</helmet>
<div ref="{{ rootRef }}" style="position: relative; width: 100%;">
  <nav style="display: flex; align-items: center; justify-content: space-between; padding: 14px clamp(16px,4vw,48px); position: sticky; top: 0; z-index: 30; background: rgba(255,255,255,0.96); box-shadow: 0 2px 20px rgba(0,0,0,.1);">
    <a href="WalkClubLV.dc.html" style="display: flex; align-items: flex-start; line-height: .72; font-family: 'Anton', sans-serif; font-size: 26px;">
      <img src="assets/logo-light.png" alt="Walk Club LV" style="height: 44px; width: auto; display: block;" />
    </a>
    <a href="WalkClubLV.dc.html" style="font-family: 'Oswald', sans-serif; text-transform: uppercase; font-weight: 700; font-size: 14px; letter-spacing: .06em; background: #000; color: #fff; padding: 10px 20px; border-radius: 999px; transition: background .3s ease, transform .2s ease;" style-hover="background: #FF914D; transform: scale(1.05);">← Back home</a>
  </nav>

  <header style="background: #00BF63; color: #fff; padding: clamp(60px,9vw,120px) clamp(20px,5vw,80px); text-align: center; position: relative; overflow: hidden;">
    <div style="position: absolute; bottom: -70px; right: -50px; width: 300px; height: 300px; background: #FF914D; opacity: .35; border-radius: 50%; animation: wc-float 7s ease-in-out infinite;"></div>
    <div style="font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .3em; font-weight: 600; font-size: 14px; margin-bottom: 12px; position: relative;">Our story</div>
    <h1 style="font-family: 'Anton', sans-serif; font-size: clamp(44px,10vw,140px); line-height: .84; margin: 0; position: relative;">COME FOR THE WALK.<br /><span style="color: #000;">STAY FOR THE COMMUNITY.</span></h1>
  </header>

  <section style="max-width: 780px; margin: 0 auto; padding: clamp(50px,7vw,90px) clamp(24px,5vw,40px);">
    <sc-for list="{{ paras }}" as="p" hint-placeholder-count="4">
      <p style="font-family: 'DM Sans', sans-serif; font-size: clamp(18px,2.3vw,22px); line-height: 1.65; margin: 0 0 26px; color: #111;">{{ p }}</p>
    </sc-for>
    <div style="display: flex; justify-content: center; gap: 8px; margin: 40px 0; flex-wrap: wrap;">
      <sc-for list="{{ walkers }}" as="w" hint-placeholder-count="5">
        <svg viewBox="0 0 60 150" style="width: clamp(50px,10vw,84px); height: auto; animation: walkbob 1.4s ease-in-out infinite; animation-delay: {{ w.delay }};">
          <circle cx="30" cy="20" r="13" fill="{{ w.c1 }}" stroke="#000" stroke-width="3"></circle>
          <rect x="20" y="36" width="20" height="52" rx="10" fill="{{ w.c2 }}" stroke="#000" stroke-width="3"></rect>
          <line x1="24" y1="88" x2="16" y2="132" stroke="#000" stroke-width="7" stroke-linecap="round"></line>
          <line x1="36" y1="88" x2="46" y2="130" stroke="#000" stroke-width="7" stroke-linecap="round"></line>
          <line x1="22" y1="50" x2="10" y2="70" stroke="#000" stroke-width="6" stroke-linecap="round"></line>
          <line x1="38" y1="50" x2="50" y2="64" stroke="#000" stroke-width="6" stroke-linecap="round"></line>
        </svg>
      </sc-for>
    </div>
  </section>

  <section style="background: #000; color: #fff; padding: clamp(50px,8vw,100px) clamp(20px,5vw,60px);">
    <div style="max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 18px;">
      <sc-for list="{{ values }}" as="v" hint-placeholder-count="3">
        <div style="background: {{ v.bg }}; color: {{ v.fg }}; border: 3px solid {{ v.fg }}; border-radius: 20px; padding: 28px;">
          <div style="font-family: 'Anton', sans-serif; font-size: 34px; line-height: 1; margin-bottom: 10px;">{{ v.title }}</div>
          <div style="font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5;">{{ v.body }}</div>
        </div>
      </sc-for>
    </div>
  </section>

  <footer style="background: #FF914D; color: #000; text-align: center; padding: clamp(50px,8vw,100px) 20px;">
    <h2 style="font-family: 'Archivo Black', sans-serif; font-size: clamp(30px,6vw,64px); margin: 0 0 22px;">See you Saturday.</h2>
    <a href="WalkClubLV.dc.html#join" style="font-family: 'Oswald', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 18px; background: #000; color: #fff; padding: 15px 32px; border-radius: 999px; transition: background .3s ease, transform .2s ease;" style-hover="background: #00BF63; transform: scale(1.05);">Join the walk →</a>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  rootRef = React.createRef();
  renderVals() {
    return {
      rootRef: this.rootRef,
      paras: [
        'Walk Club LV started with a simple idea: a couple of friends, a park, and two easy miles every Saturday morning. No apps, no pace goals, no pressure — just movement and good company.',
        'Then we started grabbing breakfast after. Turns out sharing eggs and coffee with people who just walked two miles with you is one of the best ways to make real friends in Las Vegas.',
        "Word got out. The group grew. What began as a handful of walkers is now a fast-growing crew that shows up rain or shine, every single Saturday.",
        "That's the whole thing: come for the walk, stay for the community. Everyone's welcome — every age, every pace, every level. Just show up and move with us.",
      ],
      walkers: [
        { c1: '#FF914D', c2: '#00BF63', delay: '0s' },
        { c1: '#00BF63', c2: '#FF914D', delay: '.15s' },
        { c1: '#000', c2: '#FF914D', delay: '.3s' },
        { c1: '#FF914D', c2: '#000', delay: '.45s' },
        { c1: '#00BF63', c2: '#000', delay: '.6s' },
      ],
      values: [
        { title: 'Walk', bg: '#FF914D', fg: '#000', body: 'Two miles, easy pace, every Saturday at a local park. All levels, always.' },
        { title: 'Connect', bg: '#00BF63', fg: '#000', body: 'Social hour after every walk — breakfast, laughs, and new friends.' },
        { title: 'Grow', bg: '#fff', fg: '#000', body: 'A community that keeps showing up. Bring a friend, become a regular.' },
      ],
    };
  }
}
</script>
</body>
</html>
